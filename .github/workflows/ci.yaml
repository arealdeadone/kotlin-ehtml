name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]


  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        name: Setup JDK
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build Project
        run: ./gradlew build
